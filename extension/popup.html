<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 span {
      color: #C8F060;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #2a2a2a;
      border-radius: 6px;
      margin-bottom: 12px;
    }
    .status.connected .dot {
      background: #4ade80;
    }
    .status.disconnected .dot {
      background: #f87171;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .stat {
      background: #2a2a2a;
      padding: 12px;
      border-radius: 6px;
      text-align: center;
    }
    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: #C8F060;
    }
    .stat-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    button {
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      background: #C8F060;
      color: #1a1a1a;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #b8e050;
    }
  </style>
</head>
<body>
  <h1>ferrum<span>-dl</span></h1>
  
  <div class="status connected" id="status">
    <div class="dot"></div>
    <span>Connected to rustaria</span>
  </div>
  
  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="active">0</div>
      <div class="stat-label">Active</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="queued">0</div>
      <div class="stat-label">Queued</div>
    </div>
  </div>
  
  <button id="open-tui">Open Download Manager</button>
  
  <script src="dist/popup.js"></script>
</body>
</html>
